    value: '1'
  - key: SNIPER_CB_CONSEC_LOSSES
    value: '3'
  - key: SNIPER_SIZE_PCT
    value: '0.50'
  - key: SNIPER_LEVERAGE
    value: '5.0'
  - key: SNIPER_MIN_TRADE_USD
