services:
- type: web
  name: core
  runtime: python
  region: oregon
  plan: starter
  branch: main
  rootDir: core
  buildCommand: pip install -r ../requirements.txt
  startCommand: python3 server.py
  healthCheckPath: /health
  autoDeploy: true
  disk:
    name: core-state
    mountPath: /var/data
    sizeGB: 1
  envVars:
  - key: HL_AGENT_WALLET
    value: '0xaed87768d3b6a76c997b6c0048610ab1e718fdb2'
  - key: HL_PRIVATE_KEY
    sync: false
  - key: LIVE_TRADING
    value: '0'
  - key: BINANCE_SYMBOLS
    value: BTCUSDT,ETHUSDT,SOLUSDT,XRPUSDT,BNBUSDT,DOGEUSDT,AVAXUSDT,LINKUSDT,LTCUSDT,NEARUSDT,SUIUSDT,APTUSDT,ARBUSDT,OPUSDT,INJUSDT,SEIUSDT,TIAUSDT,WIFUSDT,JUPUSDT,DOTUSDT
  - key: STRATEGY_LEGACY_LOAD
    value: '1'
  - key: STRATEGY_E01_ZFADE3S_TU_1D_ENABLED
    value: '1'
  - key: STRATEGY_E07_ZFADE2S_TU_1D_ENABLED
    value: '1'
  - key: STRATEGY_E08_DIP3D10_TD_1D_ENABLED
    value: '1'
  - key: STRATEGY_E09_PUMP3D10_TD_1D_ENABLED
    value: '1'
  - key: STRATEGY_E16_BB_FADE_HV_1D_ENABLED
    value: '1'
  - key: STRATEGY_E17_BB_FADE_BT_1D_ENABLED
    value: '1'
  - key: STRATEGY_E01_ZFADE3S_TU_4H_ENABLED
    value: '1'
  - key: STRATEGY_E07_ZFADE2S_TU_4H_ENABLED
    value: '1'
  - key: STRATEGY_E08_DIP3D7_TD_4H_ENABLED
    value: '1'
  - key: STRATEGY_E16_BB_FADE_HV_4H_ENABLED
    value: '1'
  - key: STRATEGY_E17_BB_FADE_BT_4H_ENABLED
    value: '1'
  - key: STRATEGY_FSP_ENABLED
    value: '1'
  - key: STRATEGY_LIQ_CASCADE_ENABLED
    value: '1'
  - key: STRATEGY_ICT_CONFLUENCE_4H_ENABLED
    value: '1'
  - key: STRATEGY_ICT_CONFLUENCE_1D_ENABLED
    value: '0'
  - key: RISK_PCT_PER_TRADE
    value: '0.02'
  - key: LEVERAGE
    value: '5.0'
  - key: MAX_OPEN_POSITIONS
    value: '20'
  - key: SCAN_INTERVAL_SEC
    value: '300'
  - key: LIVE_SAFETY_DB
    value: /var/data/live_safety.sqlite
  - key: RISK_PCT_PER_TRADE_ICT
    value: '0.0025'
  - key: LEVERAGE_LIVE
    value: '3.0'
  - key: MAX_CONCURRENT_LIVE
    value: '1'
  - key: CB_CONSEC_LOSSES
    value: '3'
  - key: CB_DD_7D_PCT
    value: '0.10'
  - key: DAILY_LOSS_LIMIT_PCT
    value: '0.02'
  - key: PM_FORCE_KILL_ALL
    value: '0'
  - key: PM_AUTH_TOKEN
    sync: false
  - key: HALT_TOKEN
    sync: false
  - key: COOLDOWN_DB
    value: /var/data/cooldowns.sqlite
  - key: CLAUDE_CODE_API_KEY
    sync: false
  - key: DAILY_API_BUDGET_USD
    value: '5'
  - key: KRONOS_GATE_ENABLED
    value: '0'
  - key: STATE_DIR
    value: /var/data
  - key: HTTP_PORT
    value: '10000'
- type: web
  name: sniper
  runtime: python
  region: oregon
  plan: starter
